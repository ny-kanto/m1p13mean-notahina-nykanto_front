<svg viewBox="0 0 1200 700">

  <rect width="1200" height="700" fill="#f5f5f5" />

  <rect x="200" y="280" width="800" height="140" class="wall" />

  <rect [attr.class]="'store anchor' + (isSelected('food-court') ? ' selected' : '')"
        x="900" y="100" width="250" height="500" id="food-court"
        (click)="onClick('food-court')" />
  <text x="1025" y="350" class="label" font-weight="bold">
    {{ zoneLabels['food-court'] }}
  </text>

  <rect [attr.class]="'store' + (isSelected('shop-301') ? ' selected' : '')"
        x="240" y="90" width="180" height="140" id="shop-301"
        (click)="onClick('shop-301')" />
  <text x="330" y="165" class="label">{{ zoneLabels['shop-301'] }}</text>

  <rect [attr.class]="'store' + (isSelected('shop-302') ? ' selected' : '')"
        x="450" y="90" width="200" height="140" id="shop-302"
        (click)="onClick('shop-302')" />
  <text x="550" y="165" class="label">{{ zoneLabels['shop-302'] }}</text>

  <rect [attr.class]="'store' + (isSelected('shop-303') ? ' selected' : '')"
        x="680" y="90" width="180" height="140" id="shop-303"
        (click)="onClick('shop-303')" />
  <text x="770" y="165" class="label">{{ zoneLabels['shop-303'] }}</text>

  <rect [attr.class]="'service' + (isSelected('stairs-down') ? ' selected' : '')"
        x="760" y="470" width="90" height="90"
        (click)="onClick('stairs-down')" />
  <text x="805" y="525" class="label">Descendre</text>

  <rect class="door"
        x="900"
        y="450"
        width="12"
        height="40"
        (click)="onClick('door-food-court')" />

  <rect class="door"
      x="320"
      y="218"
      width="20"
      height="12"
      (click)="onClick('door-301')" />

  <rect class="door"
      x="540"
      y="218"
      width="20"
      height="12"
      (click)="onClick('door-302')" />

  <rect class="door"
      x="760"
      y="218"
      width="20"
      height="12"
      (click)="onClick('door-303')" />

  @if (pathRdc) {
    <polyline [attr.points]="pathRdc" fill="none" stroke="blue" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  }

</svg>

<style>
    .store {
      fill: #e0e0e0;
      stroke: #444;
      stroke-width: 2;
      cursor: pointer;
      transition: fill 0.2s;
    }

    .store:hover {
      fill: #ffd54f;
    }

    .anchor {
      fill: #c5e1a5;
    }

    /* Remplacement du couloir par un mur */
    .wall {
      fill: #9e9e9e;
      stroke: #616161;
      stroke-width: 1;
    }

    .service {
      fill: #b3e5fc;
    }

    .selected {
      fill: red !important;
    }

    .label {
      font-family: Arial, sans-serif;
      font-size: 12px;
      text-anchor: middle;
      pointer-events: none;
      fill: #333;
    }

    text {
      pointer-events: none;
    }

    .door {
      fill: #6d4c41;
      stroke: #3e2723;
      stroke-width: 1;
    }
  </style>
